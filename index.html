<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Theo Notes</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0a10">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="icon" type="image/png" href="favicon.png">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0a0a10;
    --surface: #13131a;
    --border: rgba(255,255,255,0.07);
    --text-primary: #f1f5f9;
    --text-secondary: #94a3b8;
    --text-muted: #475569;
    --accent: #fb923c;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text-primary); font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif; }

  /* ── HEADER ── */
  .hub-header {
    padding: 48px 32px 0;
    max-width: 900px;
    margin: 0 auto;
  }
  .hub-header h1 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text-primary);
  }
  .hub-header p {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* ── GRID ── */
  .hub-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
    padding: 32px;
    max-width: 900px;
    margin: 0 auto;
  }

  /* ── PROJECT CARD ── */
  .project-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    gap: 12px;
    transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
    -webkit-user-select: none;
    user-select: none;
  }
  .project-card:hover {
    border-color: rgba(255,255,255,0.14);
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .project-card:active { transform: translateY(0); }

  .card-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .card-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1.3;
  }
  .card-meta {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: auto;
    display: flex;
    gap: 10px;
  }
  .card-dots {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }
  .card-dot { width: 7px; height: 7px; border-radius: 50%; }

  /* ── NEW PROJECT CARD ── */
  .new-card {
    border: 1px dashed rgba(255,255,255,0.1);
    background: transparent;
    align-items: center;
    justify-content: center;
    min-height: 130px;
    gap: 8px;
    color: var(--text-muted);
    font-size: 13px;
    font-weight: 500;
  }
  .new-card:hover { border-color: rgba(255,255,255,0.22); color: var(--text-secondary); }
  .new-card-plus { font-size: 28px; line-height: 1; }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.65);
    display: flex; align-items: center; justify-content: center;
    z-index: 200;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
    padding: 20px;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal-box {
    background: #1a1a24;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 18px;
    padding: 28px 24px 24px;
    width: 100%;
    max-width: 380px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    transform: translateY(8px);
    transition: transform 0.2s;
  }
  .modal-overlay.open .modal-box { transform: translateY(0); }
  .modal-title { font-size: 17px; font-weight: 700; }
  .modal-input {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text-primary);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }
  .modal-input:focus { border-color: rgba(255,255,255,0.25); }
  .modal-error { font-size: 12px; color: #f87171; min-height: 16px; }
  .modal-row { display: flex; gap: 10px; }
  .btn-primary {
    flex: 1;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    padding: 11px;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: opacity 0.15s;
  }
  .btn-primary:hover { opacity: 0.88; }
  .btn-secondary {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 11px 18px;
    color: var(--text-secondary);
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
  }
  .btn-secondary:hover { background: rgba(255,255,255,0.09); }

  @media (max-width: 500px) {
    .hub-header { padding: 32px 20px 0; }
    .hub-grid { padding: 20px; gap: 12px; }
  }
</style>
</head>
<body>

<div class="hub-header">
  <h1>Theo Notes</h1>
  <p>Your note projects</p>
</div>

<div class="hub-grid" id="hub-grid">
  <!-- populated by JS -->
</div>

<!-- New Project Modal -->
<div class="modal-overlay" id="modal-new-project">
  <div class="modal-box">
    <div class="modal-title">New Project</div>
    <input class="modal-input" id="np-name" type="text" placeholder="Project name…" autocomplete="off" maxlength="60" />
    <div class="modal-error" id="np-error"></div>
    <div class="modal-row">
      <button class="btn-primary" id="np-save">Create</button>
      <button class="btn-secondary" id="np-cancel">Cancel</button>
    </div>
  </div>
</div>

<script>
const HUB_KEY = 'theo-notes-hub';

// Default "Theological Notes" project always present
const DEFAULT_PROJECT = {
  id: 'default',
  name: 'Theological Notes',
  icon: '✝',
  iconBg: 'rgba(96,165,250,0.15)',
  created: '2024-01-01'
};

function loadProjects() {
  try {
    const raw = localStorage.getItem(HUB_KEY);
    const list = raw ? JSON.parse(raw) : [];
    // Ensure default is always first
    if (!list.find(p => p.id === 'default')) list.unshift(DEFAULT_PROJECT);
    return list;
  } catch(e) { return [DEFAULT_PROJECT]; }
}

function saveProjects(list) {
  localStorage.setItem(HUB_KEY, JSON.stringify(list));
}

function getNoteCount(project) {
  try {
    const key = project.id === 'default' ? 'theology-graph-v2' : 'theo-notes-' + project.id;
    const raw = localStorage.getItem(key);
    if (!raw) return project.id === 'default' ? '50 seed notes' : '0 notes';
    const data = JSON.parse(raw);
    const count = Array.isArray(data.notes) ? data.notes.length : 0;
    return count + (count === 1 ? ' note' : ' notes');
  } catch(e) { return '–'; }
}

function getCategoryColors(project) {
  const defaults = ['#60a5fa','#a78bfa','#34d399','#fbbf24','#f87171','#fb923c'];
  try {
    const key = project.id === 'default' ? 'theology-graph-v2' : 'theo-notes-' + project.id;
    const raw = localStorage.getItem(key);
    if (!raw) return defaults;
    const data = JSON.parse(raw);
    if (data.customCats) {
      const custom = Object.values(data.customCats).map(c => c.color);
      return [...defaults, ...custom].slice(0, 8);
    }
  } catch(e) {}
  return defaults;
}

function renderGrid() {
  const grid = document.getElementById('hub-grid');
  grid.innerHTML = '';
  const projects = loadProjects();

  projects.forEach(p => {
    const card = document.createElement('a');
    card.className = 'project-card';
    card.href = `app.html${p.id !== 'default' ? '?p=' + encodeURIComponent(p.id) : ''}`;

    const colors = getCategoryColors(p);
    const dots = colors.slice(0, 6).map(c => `<div class="card-dot" style="background:${c}"></div>`).join('');

    card.innerHTML = `
      <div class="card-icon" style="background:${p.iconBg || 'rgba(251,146,60,0.15)'}">
        ${p.icon || '📝'}
      </div>
      <div class="card-name">${p.name}</div>
      <div class="card-dots">${dots}</div>
      <div class="card-meta">
        <span>${getNoteCount(p)}</span>
      </div>`;
    grid.appendChild(card);
  });

  // New project card
  const newCard = document.createElement('div');
  newCard.className = 'project-card new-card';
  newCard.innerHTML = `<div class="new-card-plus">+</div><div>New Project</div>`;
  newCard.addEventListener('click', openNewProjectModal);
  grid.appendChild(newCard);
}

// ── New Project Modal ──
function openNewProjectModal() {
  document.getElementById('np-name').value = '';
  document.getElementById('np-error').textContent = '';
  document.getElementById('modal-new-project').classList.add('open');
  setTimeout(() => document.getElementById('np-name').focus(), 80);
}

function closeNewProjectModal() {
  document.getElementById('modal-new-project').classList.remove('open');
}

document.getElementById('np-cancel').onclick = closeNewProjectModal;
document.getElementById('modal-new-project').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeNewProjectModal();
});

document.getElementById('np-save').onclick = () => {
  const name = document.getElementById('np-name').value.trim();
  const errEl = document.getElementById('np-error');
  if (!name) { errEl.textContent = 'Enter a project name.'; return; }

  const id = name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') + '-' + Date.now();
  const project = {
    id,
    name,
    icon: '📝',
    iconBg: 'rgba(251,146,60,0.15)',
    created: new Date().toISOString().slice(0, 10)
  };

  const projects = loadProjects();
  projects.push(project);
  saveProjects(projects);
  closeNewProjectModal();
  window.location.href = `app.html?p=${encodeURIComponent(id)}`;
};

document.getElementById('np-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('np-save').click();
  if (e.key === 'Escape') closeNewProjectModal();
});

renderGrid();
</script>
</body>
</html>
